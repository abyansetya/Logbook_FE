name: Frontend CI

on:
  push:
    branches:
      - main
      - skripsi
  pull_request:
    branches:
      - main
      - skripsi

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    name: Frontend Checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
